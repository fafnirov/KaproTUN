name: Android CI

# Каждый push в main и каждый PR — собираем debug APK + прогоняем
# unit-тесты. Защищает от регрессий в Kotlin-портaх парсера/конфига
# (37 тестов) и от поломок Compose-сборки.
#
# Release-сборка (signed, R8, ABI splits) сюда не лезет: ей нужен
# приватный keystore — это отдельный workflow с secrets, который
# сделаем когда появится первый релиз-кандидат.

on:
  push:
    branches: [main]
    # Не запускаем на каждом изменении в kapro_vpn/ — десктоп-only
    # коммиты не должны крутить Android CI. Аналогично для docs.
    paths:
      - 'android/**'
      - 'kapro_vpn/data/default_sites.json'  # шарится с Android assets
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'kapro_vpn/data/default_sites.json'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

# Cancel предыдущий run на том же ref если пришёл новый push — нет
# смысла гонять CI на устаревшем коде PR.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build debug + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Без явной версии берётся latest stable. Мы фиксируем 34
          # чтобы CI совпадал с локальной сборкой.
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle caches + wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/libs.versions.toml', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache libv2ray.aar (~55 MB)
        # Аар скачивается отдельным Gradle-task'ом на первую сборку.
        # Кешируем чтобы не качать его на каждом CI run.
        uses: actions/cache@v4
        with:
          path: android/app/libs/libv2ray.aar
          # Ключ зависит от libV2rayVersion в app/build.gradle.kts.
          # При бампе версии кеш инвалидируется автоматически.
          key: libv2ray-${{ hashFiles('android/app/build.gradle.kts') }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Run unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --console=plain --stacktrace

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --console=plain --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kaprovpn-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: android/app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
